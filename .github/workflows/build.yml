name: CI of state-observation

on:
  push:
    branches:
      - '**'
  pull_request:
    branches:
      - '**'

# cancel running workflows when pushing to the same branch/pr
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-22.04, ubuntu-24.04, ubuntu-26.04, macos-latest, windows-latest]
        build-type: [Debug, RelWithDebInfo]
        compiler: [gcc, clang]
        include:
          - os: windows-latest
            compiler: gcc
            build-type: script
        exclude:
          # Only default compiler on macos-latest and windows-latest
          - os: macos-latest
            compiler: clang
          - os: windows-latest
            compiler: clang
    runs-on: ${{ matrix.os }}
    steps:
    - uses: actions/checkout@v2
      with:
        submodules: recursive
    - name: Cleanup windows environment
      shell: bash
      run: |
        set -x
        rm -rf /c/hostedtoolcache/windows/Boost/1.72.0/lib/cmake/Boost-1.72.0
      if: matrix.os == 'windows-latest'
    - name: Install dependencies
      if: matrix.build-type != 'script'
      uses: jrl-umi3218/github-actions/install-dependencies@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
        ubuntu: |
          apt: libeigen3-dev doxygen doxygen-latex libboost-all-dev libbenchmark-dev
        macos: |
          brew: eigen boost pkg-config doxygen google-benchmark
        windows: |
          github:
            - path: eigen-mirror/eigen
              ref: 3.4.1
            - path: google/benchmark
              ref: v1.8.3
    - name: Build and test
      if: matrix.build-type != 'script'
      uses: jrl-umi3218/github-actions/build-cmake-project@master
      with:
        compiler: ${{ matrix.compiler }}
        build-type: ${{ matrix.build-type }}
    - name: Build with script
      if: matrix.build-type == 'script'
      shell: bash
      run: |
        set -x
        cd utils
        if [[ "${{ matrix.os }}" == "windows-latest" ]]
        then
          ./build_and_install-windows.sh
        fi
    - name: Slack Notification
      if: failure()
      uses: archive/github-actions-slack@master
      with:
        slack-bot-user-oauth-access-token: ${{ secrets.SLACK_BOT_TOKEN }}
        slack-channel: '#ci'
        slack-text: >
          [state-observation] Build *${{ matrix.os }}/${{ matrix.build-type }} (${{ matrix.compiler }})* failed on ${{ github.ref }}
  check:
    if: always()
    name: check-build
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
