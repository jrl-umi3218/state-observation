name: "CI - Nix"
on:
  push:
    branches:
      - devel
      - master
      - main
  pull_request:
    branches:
      - devel
      - master
      - main
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
jobs:
  nix:
    runs-on: "${{ matrix.os }}-latest"
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu]
    steps:
      - uses: actions/checkout@v6
      - uses: cachix/install-nix-action@v31
      - uses: cachix/cachix-action@v17
        with:
          name: mc-rtc-nix
          authToken: '${{ secrets.CACHIX_AUTH_TOKEN }}'
          extraPullNames: "ros,gepetto"
      - run: nix flake check -L
      - run: nix build -L
      - run: nix build -L .#state-observation.doc
      - name: Deploy to GitHub Pages
        if: github.ref == 'refs/heads/master' && github.repository == 'jrl-umi3218/mc_state_observation'
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GH_PAGES_TOKEN }}
          publish_dir: ./result-doc/share/doc/state-observation/doxygen-html
          destination_dir: doxygen/HEAD
  check:
    if: always()
    name: check-macos-linux-nix
    runs-on: ubuntu-latest
    needs:
      - nix
    steps:
      - uses: re-actors/alls-green@release/v1
        with:
          jobs: ${{ toJSON(needs) }}
